<!DOCTYPE html>
<html>
<head>
    <!--
      If you are serving your web app in a path other than the root, change the
      href value below to reflect the base path you are serving from.

      The path provided below has to start and end with a slash "/" in order for
      it to work correctly.

      For more details:
      * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

      This is a placeholder for base href that will be replaced by the value of
      the `--base-href` argument provided to `flutter build`.
    -->
    <base href="/">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="Quick Bites, Big Delights">

    <!-- iOS meta tags & icons -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Go4Food">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="icons/favicon-96x96.png" sizes="96x96"/>
    <link rel="icon" type="image/svg+xml" href="icons/favicon.svg"/>
    <link rel="shortcut icon" href="icons/favicon.ico"/>
    <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png"/>
    <link rel="manifest" href="icons/site.webmanifest"/>

    <title>Go4Food</title>
    <link rel="manifest" href="manifest.json">


    <script src="assets/packages/flutter_inappwebview_web/assets/web/web_support.js" defer></script>

</head>
<body>
<div id="error-logs" style="position: absolute; top: 0; left: 0; z-index: 9999; background: white; color: red; max-height: 50vh; overflow-y: auto; padding: 10px; border: 2px solid red;"></div>
<script>
  window.onerror = function(message, source, lineno, colno, error) {
    document.getElementById('error-logs').innerText += "Error: " + message + " at " + source + ":" + lineno + ":" + colno + "\n";
  };
  window.addEventListener('unhandledrejection', function(event) {
    document.getElementById('error-logs').innerText += "Unhandled Promise Rejection: " + event.reason + "\n";
  });
  const originalError = console.error;
  console.error = function(...args) {
    document.getElementById('error-logs').innerText += "Console Error: " + args.join(' ') + "\n";
    originalError.apply(console, args);
  };
</script>
<script src="flutter_bootstrap.js" async></script>
</body>
</html>
